project:
  title: ArXiv Research Assistant
  top_k: 150
  keep_days: 30
  timezone: Asia/Shanghai
  language: Chinese

prompts:
  # Editable backend prompt templates.
  dir: prompts/backend

source:
  # Default production mode now uses strict non-overlapping API windows.
  mode: api_strict_window
  api:
    sort_by: submittedDate
    sort_order: descending
    max_results_per_category: 200
    window_lookback_hours_if_no_state: 72
  fetch_state:
    path: fetch_state.json

retrieval:
  max_feed_items_per_category: 120
  domains:
    - name: biology
      priority: 100
      filter_mode: hard
      categories:
        - q-bio.GN
        - q-bio.MN
        - q-bio.QM
        - q-bio.CB
        - physics.bio-ph
        - stat.AP
      keywords:
        - single-cell
        - omics
        - gene regulatory
        - biological network
        - cell state
      cross_keywords:
        - machine learning
        - deep learning
        - neural network
        - transformer
        - foundation model
        - diffusion
        - representation learning
        - graph neural network
        - computational
        - algorithm
    - name: ai4science
      priority: 90
      filter_mode: hard
      categories:
        - cs.LG
        - cs.CE
        - cs.NE
        - cs.SY
        - cs.GR
        - cs.GT
        - eess.SP
        - physics.comp-ph
        - math.NA
        - stat.ML
      keywords:
        - scientific machine learning
        - surrogate model
        - neural operator
        - symbolic regression
        - operator learning
        - equation discovery
        - stochastic simulation
        - cme
    - name: math-physics
      priority: 70
      filter_mode: soft
      categories:
        - math.AP
        - math.PR
        - math.OC
        - math-ph
        - nlin.PS
        - physics.data-an
      keywords:
        - stochastic differential equation
        - fokker-planck
    - name: llm
      priority: 50
      filter_mode: soft
      categories:
        - cs.CL
        - cs.AI
        - cs.IR
        - cs.IT
      keywords:
        - language model
        - reasoning
    - name: cv
      priority: 40
      filter_mode: soft
      categories:
        - cs.CV
        - cs.MM
        - eess.IV
      keywords:
        - diffusion
        - vision transformer

relevance:
  research_context: >
    Biology x Computer Science research focus.
    I am especially interested in method papers related to symbolic regression,
    neural operators, operator learning, scientific machine learning,
    equation discovery, surrogate modeling, and transferable modeling methods
    for biological systems, stochastic systems, and dynamical systems.
  keywords:
    - symbolic regression
    - neural operator
    - operator learning
    - scientific machine learning
    - equation discovery
    - surrogate modeling
    - PDE surrogate
    - biology
    - system identification
    - dynamics modeling
    - single-cell
    - omics
    - gene expression
    - flow matching
    - trajectory prediction
    - stochastic simulation
    - SSA
    - CME
  # DashScope (Alibaba Bailian) suggested default
  # You can replace with other embedding models later.
  embedding_model: text-embedding-v4

rerank:
  mode: embedding_plus_qwen3_rerank
  model: qwen3-rerank
  pool_size: 500
  instruct: >
    Given a research profile, rank candidate arXiv papers by:
    1) methodological relevance to symbolic regression, neural operators,
       operator learning, scientific machine learning, and equation discovery;
    2) transferability to biology, stochastic systems, and dynamical systems;
    3) idea-generation potential for future research.

analysis:
  # DeepSeek (chat) suggested default; can be replaced by OpenAI/Qwen etc.
  model: deepseek-chat
  temperature: 0.2
