name: lint-and-validate

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install frontend tooling
        run: npm install

      - name: Lint frontend scripts
        run: npm run lint

      - name: Syntax check frontend scripts
        run: find web/scripts -name '*.js' -print0 | xargs -0 -n1 node --check

  python:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install runtime dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Python syntax check
        run: python -m compileall app scripts tests

      - name: Run tests
        run: pytest -q
