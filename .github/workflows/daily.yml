name: arxiv-research-daily

on:
  schedule:
    # Every day at 06:00 in Asia/Shanghai.
    - cron: "0 6 * * *"
      timezone: "Asia/Shanghai"
  workflow_dispatch:

concurrency:
  group: arxiv-research-daily
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      OUTPUT_DATA_DIR: build/generated-data
      SITE_OUTPUT_DIR: build/site
      PUBLISH_BRANCH: gh-pages
      TZ: Asia/Shanghai
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Prepare config
        run: cp config/config.example.yaml config/config.yaml

      - name: Run pipeline
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
          EMBEDDING_API_KEY: ${{ secrets.EMBEDDING_API_KEY }}
          EMBEDDING_BASE_URL: ${{ secrets.EMBEDDING_BASE_URL }}
          RERANK_API_KEY: ${{ secrets.RERANK_API_KEY }}
          RERANK_BASE_URL: ${{ secrets.RERANK_BASE_URL }}
          DASHSCOPE_API_KEY: ${{ secrets.DASHSCOPE_API_KEY }}
        run: python scripts/run_pipeline.py --data-dir "$OUTPUT_DATA_DIR"

      - name: Build deployable site bundle
        run: python scripts/build_site.py --source-data "$OUTPUT_DATA_DIR" --output-dir "$SITE_OUTPUT_DIR"

      - name: Publish generated site and data to gh-pages output branch
        env:
          GH_TOKEN: ${{ secrets.PAGES_DEPLOY_TOKEN || github.token }}
          REPO: ${{ github.repository }}
        run: |
          rm -rf /tmp/arxiv4research-pages
          mkdir -p /tmp/arxiv4research-pages
          cp -R "$SITE_OUTPUT_DIR"/. /tmp/arxiv4research-pages/
          cd /tmp/arxiv4research-pages
          git init
          git checkout --orphan "$PUBLISH_BRANCH"
          git config user.name "${{ vars.NAME || 'github-actions[bot]' }}"
          git config user.email "${{ vars.EMAIL || 'github-actions[bot]@users.noreply.github.com' }}"
          git add --all
          if git diff --cached --quiet; then
            echo "No site changes to publish."
            exit 0
          fi
          git commit -m "chore(pages): update daily arxiv site"
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${REPO}.git"
          git push --force origin "$PUBLISH_BRANCH"
